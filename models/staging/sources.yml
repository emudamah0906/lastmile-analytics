# sources.yml
# ============
# Sources define the raw data that enters your dbt project.
# Think of this as the "contract" between your raw data and your transformations.
# dbt uses this to:
#   1. Generate the {{ source() }} function references
#   2. Run freshness checks (is the data up-to-date?)
#   3. Document where data comes from

version: 2

sources:
  - name: raw
    description: "Raw data loaded from CSV seeds — simulating data ingested from operational systems"
    schema: main_raw
    tables:
      - name: raw_orders
        description: "Ecommerce orders placed by customers"
        columns:
          - name: order_id
            description: "Unique identifier for each order"
          - name: customer_id
            description: "FK to customers table"
          - name: warehouse_id
            description: "FK to warehouses table — where the order ships from"

      - name: raw_deliveries
        description: "Last-mile delivery events"
        columns:
          - name: delivery_id
            description: "Unique identifier for each delivery"
          - name: order_id
            description: "FK to orders table"
          - name: driver_id
            description: "FK to drivers table"

      - name: raw_customers
        description: "Ecommerce brands using our logistics platform"

      - name: raw_drivers
        description: "Delivery drivers and their vehicle information"

      - name: raw_warehouses
        description: "Fulfillment centers / warehouses"

      - name: raw_zone_performance
        description: "Delivery zone performance metrics extracted from API"
